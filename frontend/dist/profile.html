<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>个人中心 - BG Remover</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .logo { font-size: 20px; font-weight: 700; }
  nav a {
    margin-left: 20px;
    text-decoration: none;
    color: #1d1d1f;
  }
  main {
    max-width: 1000px;
    margin: 40px auto;
    padding: 0 20px;
  }
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 20px;
    margin-bottom: 16px;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }
  .stat-box {
    padding: 16px;
    background: #f5f5f7;
    border-radius: 8px;
  }
  .stat-box .label {
    font-size: 13px;
    color: #888;
    margin-bottom: 8px;
  }
  .stat-box .value {
    font-size: 28px;
    font-weight: 700;
  }
</style>
</head>
<body>
<header>
  <div class="logo">✂️ BG Remover</div>
  <nav>
    <a href="/">首页</a>
    <a href="/profile.html">个人中心</a>
  </nav>
</header>
<main>
  <div class="card">
    <h2>使用统计</h2>
    <div class="stats">
      <div class="stat-box">
        <div class="label">本月已用</div>
        <div class="value" id="used-count">-</div>
      </div>
      <div class="stat-box">
        <div class="label">剩余次数</div>
        <div class="value" id="remaining">-</div>
      </div>
      <div class="stat-box">
        <div class="label">当前套餐</div>
        <div class="value" id="plan">-</div>
      </div>
    </div>
  </div>
  <div class="card">
    <h2>处理历史</h2>
    <div id="history"></div>
  </div>
</main>
<script>
async function loadProfile() {
  const token = localStorage.getItem('auth_token');
  if (!token) {
    window.location.href = '/';
    return;
  }
  const res = await fetch('https://bg-remover-worker.zcm20010703.workers.dev/api/user/profile', {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const data = await res.json();
  document.getElementById('used-count').textContent = data.quota.used_count;
  document.getElementById('remaining').textContent = data.quota.monthly_limit - data.quota.used_count;
  document.getElementById('plan').textContent = data.quota.plan === 'free' ? '免费版' : '专业版';
}
loadProfile();
</script>
</body>
</html>
