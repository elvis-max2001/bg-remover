<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 背景去除 - 免费在线抠图</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
  }
  header {
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 { font-size: 20px; font-weight: 700; }
  header span { font-size: 13px; color: #888; }
  main {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
  }
  .hero {
    text-align: center;
    margin-bottom: 36px;
  }
  .hero h2 { font-size: 36px; font-weight: 800; margin-bottom: 10px; }
  .hero p { font-size: 16px; color: #555; }
  #drop-zone {
    border: 2px dashed #c0c0c0;
    border-radius: 16px;
    background: #fff;
    padding: 60px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }
  #drop-zone.drag-over {
    border-color: #0071e3;
    background: #f0f6ff;
  }
  #drop-zone .icon { font-size: 48px; margin-bottom: 12px; }
  #drop-zone h3 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  #drop-zone p { color: #888; font-size: 14px; }
  #drop-zone .btn-upload {
    display: inline-block;
    margin-top: 18px;
    padding: 10px 28px;
    background: #0071e3;
    color: #fff;
    border-radius: 980px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: background 0.2s;
  }
  #drop-zone .btn-upload:hover { background: #0077ed; }
  #file-input { display: none; }
  #processing {
    display: none;
    text-align: center;
    padding: 60px 20px;
    background: #fff;
    border-radius: 16px;
  }
  .spinner {
    width: 48px; height: 48px;
    border: 4px solid #e5e5e5;
    border-top-color: #0071e3;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #result {
    display: none;
    background: #fff;
    border-radius: 16px;
    overflow: hidden;
  }
  .compare {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: #e5e5e5;
  }
  .compare-panel {
    background: #fff;
    padding: 16px;
    text-align: center;
  }
  .compare-panel label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .compare-panel img {
    max-width: 100%;
    max-height: 360px;
    object-fit: contain;
    border-radius: 8px;
  }
  .result-img-wrap {
    background-image: linear-gradient(45deg, #ccc 25%, transparent 25%),
                      linear-gradient(-45deg, #ccc 25%, transparent 25%),
                      linear-gradient(45deg, transparent 75%, #ccc 75%),
                      linear-gradient(-45deg, transparent 75%, #ccc 75%);
    background-size: 16px 16px;
    background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
    border-radius: 8px;
    display: inline-block;
  }
  .result-actions {
    padding: 20px 24px;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .btn {
    padding: 10px 24px;
    border-radius: 980px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #0071e3; color: #fff; }
  .btn-secondary { background: #e5e5e5; color: #1d1d1f; }
  #error-msg {
    display: none;
    background: #fff2f2;
    border: 1px solid #ffcdd2;
    border-radius: 12px;
    padding: 16px 20px;
    color: #c62828;
    font-size: 14px;
    margin-top: 16px;
  }
  @media (max-width: 600px) {
    .compare { grid-template-columns: 1fr; }
    .hero h2 { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div style="font-size:28px">✂️</div>
  <div>
    <h1>BG Remover</h1>
    <span>Powered by remove.bg</span>
  </div>
</header>

<main>
  <div class="hero">
    <h2>一键去除图片背景</h2>
    <p>上传图片，AI 自动抠图，秒级完成，免费下载 PNG</p>
  </div>

  <div id="drop-zone">
    <div class="icon">🖼️</div>
    <h3>拖拽图片到这里</h3>
    <p>支持 JPG、PNG、WebP，最大 12MB</p>
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">选择图片</button>
    <input type="file" id="file-input" accept="image/jpeg,image/png,image/webp">
  </div>

  <div id="processing">
    <div class="spinner"></div>
    <p style="font-size:16px;color:#555">正在处理，请稍候...</p>
  </div>

  <div id="result">
    <div class="compare">
      <div class="compare-panel">
        <label>原图</label>
        <img id="original-img" src="" alt="原图">
      </div>
      <div class="compare-panel">
        <label>去背景</label>
        <div class="result-img-wrap">
          <img id="result-img" src="" alt="去背景结果">
        </div>
      </div>
    </div>
    <div class="result-actions">
      <a id="download-btn" class="btn btn-primary" download="removed-bg.png">⬇️ 下载 PNG</a>
      <button class="btn btn-secondary" onclick="reset()">重新上传</button>
    </div>
  </div>

  <div id="error-msg"></div>
</main>

<script>
  const WORKER_URL = 'https://bg-remover-worker.zcm20010703.workers.dev/remove-bg';

  const dropZone = document.getElementById('drop-zone');
  const fileInput = document.getElementById('file-input');

  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '❌ ' + msg;
    el.style.display = 'block';
  }

  function reset() {
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('processing').style.display = 'none';
    document.getElementById('result').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    fileInput.value = '';
  }

  async function handleFile(file) {
    if (!file.type.startsWith('image/')) return showError('请上传图片文件');
    if (file.size > 12 * 1024 * 1024) return showError('图片大小不能超过 12MB');

    const originalUrl = URL.createObjectURL(file);
    document.getElementById('original-img').src = originalUrl;

    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('error-msg').style.display = 'none';
    document.getElementById('processing').style.display = 'block';

    try {
      const form = new FormData();
      form.append('image', file);

      const res = await fetch(WORKER_URL, { method: 'POST', body: form });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ error: res.statusText }));
        throw new Error(err.error || '处理失败');
      }

      const blob = await res.blob();
      const resultUrl = URL.createObjectURL(blob);

      document.getElementById('result-img').src = resultUrl;
      document.getElementById('download-btn').href = resultUrl;

      document.getElementById('processing').style.display = 'none';
      document.getElementById('result').style.display = 'block';

    } catch (err) {
      document.getElementById('processing').style.display = 'none';
      document.getElementById('drop-zone').style.display = 'block';
      showError(err.message);
    }
  }
</script>
</body>
</html>
